<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Session</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/session.css">
</head>

<body>
  <div id="msgBox" class="hidden"></div>
  <!-- Session Banner -->
  <div id="sessionBanner">
    <div id="sessionInfo">
      <span id="sessionId">Session: ------</span>
      <button id="copyInviteBtn" class="copy-btn" title="Copy session code">📋 Copy Code</button>
    </div>
    <div id="sessionActions">
      <button id="leaveSessionBtn" class="session-action-btn leave-btn">🚪 Leave</button>
      <button id="endSessionBtn" class="session-action-btn end-btn" style="display:none;">⛔ End Session</button>
    </div>
    <span id="timer" class="timer">⏱️ 00:00</span>
  </div>

  <!-- Main landscape layout -->
  <div id="mainContainer">

    <!-- Leaderboard / Player list -->
    <aside id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <div id="playersList">
        <!-- Players will be dynamically inserted here -->
      </div>
      <div id="activePlayers">
        <p>👥 Active: <span id="activeCount">0</span></p>
      </div>
    </aside>

    <!-- Middle panel -->
    <main id="middlePanel">
      <div id="questionCard">
        <h2 id="questionText">Waiting for the master to start...</h2>
        <div id="questions">
          <div id="gameArea">
            <!-- Question and answer area -->
          </div>
          <!-- master controls panel -->
          <div id="masterControls" class="master-controls">
            <input id="questionInput" placeholder="Enter your question..." />
            <input id="answerInput" placeholder="Enter the correct answer..." />
          </div>
          <div class="start_round">
            <button id="startQuestionBtn" disabled>🚀 Start Question</button>
            <span id="playerWaitingText">⏳ Waiting for players to join (need 3)...</span>
          </div>
          <!-- player answer box -->
          <div id="playerAnswerBox" class="player-answer">
            <input id="playerGuessInput" placeholder="Type your answer..." />
            <button id="submitGuessBtn">✅ Submit</button>
            <div id="attemptsDisplay">💡 Attempts left: 3</div>
          </div>

        </div>
      </div>

      <div id="systemMessages">
        <!-- System messages will appear here -->
      </div>
    </main>

    <!-- Chat panel -->
    <aside id="chatPanel">
      <h3>💬 Chat</h3>
      <div id="chatMessages">
        <!-- Chat messages will appear here -->
      </div>
      <div id="chatInputArea">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button id="sendChat">Send</button>
      </div>
    </aside>

  </div>

  <!-- End Game Modal -->
  <div id="endGameModal" class="modal-overlay">
    <div class="modal-content end-game-modal">
      <h2 id="endGameTitle">Game Over!</h2>
      <div id="endGameWinner" class="end-game-winner"></div>
      <div id="endGameRankings" class="end-game-rankings"></div>
      <div class="end-game-actions">
        <button id="playAgainBtn" class="btn-play-again">Play Again</button>
        <button id="goHomeBtn" class="btn-go-home">Leave</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/session.js"></script>
</body>

</html>
